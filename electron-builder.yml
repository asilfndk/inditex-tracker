appId: com.atelier.inditex-tracker
productName: Atelier
copyright: © Atelier

directories:
  output: release
  buildResources: resources

# Files that go into the package (renderer export + electron bundle + dependencies)
files:
  - dist-electron/**/*
  - out/**/*
  - package.json

# Copy the migrations folder + runtime icons under Resources inside the .app
# (db-init.ts and tray.ts/main.ts look under process.resourcesPath)
extraResources:
  - from: db/migrations
    to: db/migrations
  - from: resources/trayTemplate.png
    to: trayTemplate.png
  - from: resources/trayTemplate@2x.png
    to: trayTemplate@2x.png
  - from: resources/icon.png
    to: icon.png

# After packaging, re-sign the .app with an ad-hoc signature matching the bundle id
# (needed for macOS notifications; details: scripts/afterPack.cjs)
afterPack: scripts/afterPack.cjs

asar: true
# The native module (.node) must be unpacked from asar so it can load
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

mac:
  icon: resources/icon.icns
  # Menu-bar (agent) app: do not appear in the Dock or Cmd+Tab.
  extendInfo:
    LSUIElement: 1
  # Show the architecture in both .dmg names (don't treat x64 as default and drop the suffix)
  artifactName: ${productName}-${version}-${arch}.dmg
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.lifestyle
  # Unsigned personal distribution (requires no Apple Developer account)
  identity: null

# Rebuild better-sqlite3 against the target Electron ABI
npmRebuild: true
